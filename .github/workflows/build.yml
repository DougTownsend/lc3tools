name: Build and release

on:
  push:
    tags: ["v*"]          # build + release on version tags (e.g. v0.1.0)
  workflow_dispatch:       # manual trigger for testing

jobs:
  # ── Linux / macOS wheels ──────────────────────────────────
  build-wheels:
    name: Wheel · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: ""
          - os: macos-14
            arch: arm64
          - os: macos-14
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.21.3

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux* *-manylinux_i686"
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}

          CIBW_BEFORE_ALL_LINUX: "yum install -y SDL2-devel ncurses-devel pkgconfig"

          # arm64: use native Homebrew at /opt/homebrew
          # x86_64: install a second x86_64 Homebrew at /usr/local via Rosetta
          CIBW_BEFORE_ALL_MACOS: >-
            if [ "$(uname -m)" = "arm64" ] && [ "${{ matrix.arch }}" = "x86_64" ]; then
              arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" &&
              arch -x86_64 /usr/local/bin/brew install sdl2 pkg-config;
            else
              brew install sdl2 pkg-config;
            fi

          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=14.0
            PKG_CONFIG_PATH=${{ matrix.arch == 'x86_64' && '/usr/local/lib/pkgconfig' || '' }}

          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} {wheel}"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch || 'x64' }}
          path: wheelhouse/*.whl

  # ── Windows MSI installer ────────────────────────────────
  build-msi:
    name: MSI · Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDL2 and PDCurses via vcpkg
        run: vcpkg install sdl2:x64-windows pdcurses:x64-windows

      - name: Build and install lc3sim
        run: pip install . -v

      - name: Verify installation
        working-directory: ${{ runner.temp }}
        run: |
          python -c "import lc3py; print('lc3py OK:', lc3py.__file__)"
          $env:PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin;$env:PATH"
          python -c "import os; os.add_dll_directory(os.environ['VCPKG_INSTALLATION_ROOT']+'\\installed\\x64-windows\\bin'); from lc3py.cli_bindings import curs_main; print('curs_main OK')"

      - name: Freeze executables with PyInstaller
        working-directory: ${{ runner.temp }}
        run: |
          $env:PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin;$env:PATH"
          pip install pyinstaller
          $src = "${{ github.workspace }}\installer"
          $dst = "${{ github.workspace }}\dist"
          $vbin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          pyinstaller --onefile --console --name lc3asm --distpath $dst\lc3asm $src\lc3asm_main.py
          pyinstaller --onefile --console --name lc3sim --distpath $dst\lc3sim $src\lc3sim_main.py
          pyinstaller --onefile --console --name lc3pysim --distpath $dst\lc3pysim `
            --hidden-import lc3py.cli_bindings `
            --add-binary "$vbin\SDL2.dll;." `
            $src\lc3pysim_main.py

      - name: Install WiX v4
        run: dotnet tool install --global wix --version 4.0.6

      - name: Build MSI
        working-directory: ${{ github.workspace }}
        run: wix build -o lc3tools.msi installer\lc3tools.wxs

      - uses: actions/upload-artifact@v4
        with:
          name: msi-windows
          path: ${{ github.workspace }}\lc3tools.msi

  # ── GitHub Release ────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-wheels, build-msi]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.msi
          generate_release_notes: true

  # ── GitHub Pages package index ────────────────────────────
  update-index:
    name: Update package index
    needs: [release]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create gh-pages branch if needed
        run: |
          if ! git rev-parse --verify gh-pages 2>/dev/null; then
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            git commit --allow-empty -m "init gh-pages"
          fi

      - name: Generate PEP 503 index
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p simple/lc3sim

          WHEELS=$(gh release list --repo "$REPO" --limit 100 --json tagName -q '.[].tagName' | while read tag; do
            gh release view "$tag" --repo "$REPO" --json assets -q '.assets[].name' 2>/dev/null | grep '\.whl$' || true
          done | sort -u)

          {
            echo '<!DOCTYPE html><html><body>'
            for whl in $WHEELS; do
              TAG=$(gh release list --repo "$REPO" --limit 100 --json tagName -q '.[].tagName' | while read t; do
                gh release view "$t" --repo "$REPO" --json assets -q '.assets[].name' 2>/dev/null | grep -qx "$whl" && echo "$t" && break
              done)
              URL="https://github.com/${REPO}/releases/download/${TAG}/${whl}"
              echo "<a href=\"${URL}\">${whl}</a><br>"
            done
            echo '</body></html>'
          } > simple/lc3sim/index.html

          {
            echo '<!DOCTYPE html><html><body>'
            echo '<a href="lc3sim/">lc3sim</a>'
            echo '</body></html>'
          } > simple/index.html

      - name: Deploy to GitHub Pages
        run: |
          git add simple/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update package index for ${{ github.ref_name }}"
          git push origin gh-pages
